# =============================================================================
# Shared WireGuard VPN configuration
# Single source of truth for both the server setup (os/ubuntu/setup-vpn.sh)
# and the generated client config (cloud/azure/provision.sh).
# This file is sourced as shell; keep it to simple KEY=value assignments.
# =============================================================================

# UDP port WireGuard listens on (server) and connects to (client).
WG_PORT=51820

# WireGuard interface name on the server.
WG_INTERFACE=wg0

# Server tunnel address (server [Interface] Address).
WG_SERVER_ADDRESS=10.8.0.1/24

# Client tunnel address (client [Interface] Address).
WG_CLIENT_ADDRESS=10.8.0.2/24

# Client address as seen by the server (server [Peer] AllowedIPs).
WG_SERVER_PEER_ALLOWED_IPS=10.8.0.2/32

# DNS servers pushed to the client (client [Interface] DNS).
WG_CLIENT_DNS="8.8.8.8, 8.8.4.4"

# Traffic routed through the tunnel by the client (client [Peer] AllowedIPs).
# IPv6 is intentionally unsupported (issue #8); only IPv4 is routed.
WG_CLIENT_ALLOWED_IPS="0.0.0.0/0"

# Keepalive interval in seconds (client [Peer] PersistentKeepalive).
WG_CLIENT_KEEPALIVE=25
